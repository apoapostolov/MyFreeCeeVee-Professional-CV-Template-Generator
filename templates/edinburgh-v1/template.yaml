tokens:
  fonts:
    heading: "IBM Plex Sans"
    body: "IBM Plex Sans"
    mono: "JetBrains Mono"
  colors:
    text_primary: "#202124"
    text_secondary: "#5F6368"
    accent: "#4E557B"
    accent_light: "#E6E8F2"
    border: "#D7D9DD"
    sidebar_background: "#F2F3F5"
    background: "#FFFFFF"
  spacing:
    section_gap_px: 16
    item_gap_px: 8

layout_model:
  type: edinburgh_sidebar
  left_column_width_pct: 34
  right_column_width_pct: 66
  header_wave: true
  profile_photo_shape: circle

date_display:
  experience: year
  education: year

text_layout:
  profile_summary: single_paragraph

slots:
  - id: person.full_name
    source_hint: person.full_name
  - id: profile.photo
    source_hint: optional_sections.attachments[0]
  - id: contact.block
    source_hint: person.contact
  - id: optional.interests
    source_hint: optional_sections.interests
  - id: skills.languages
    source_hint: skills.languages
  - id: skills.technical
    source_hint: skills.technical
  - id: positioning.profile_summary
    source_hint: positioning.profile_summary
  - id: experience.items
    source_hint: experience
  - id: education.items
    source_hint: education
  - id: optional.courses
    source_hint: optional_sections.certifications
  - id: references.items
    source_hint: references

rules:
  max_pages: 2
  overflow:
    strategy: continue_to_next_page
    warn_at_page: 2
  widow_orphan_control: true
  bullet_limit_per_experience_item: 5
  show_photo_if_missing: false
