tokens:
  fonts:
    heading: "Noto Sans"
    body: "Noto Sans"
    mono: "JetBrains Mono"
  colors:
    text_primary: "#1F2937"
    text_secondary: "#4B5563"
    accent: "#1D4ED8"
    border: "#D1D5DB"
    background: "#FFFFFF"
    panel_background: "#F8FAFC"
  spacing:
    section_gap_px: 14
    item_gap_px: 8

layout_model:
  type: europass_classic_a4
  label_column_width_pct: 35
  value_column_width_pct: 65

date_display:
  experience: exact
  education: exact

text_layout:
  profile_summary: single_paragraph

slots:
  - id: person.full_name
    source_hint: person.full_name
  - id: positioning.headline
    source_hint: positioning.headline
  - id: contact.block
    source_hint: person.contact
  - id: positioning.profile_summary
    source_hint: positioning.profile_summary
  - id: experience.items
    source_hint: experience
  - id: education.items
    source_hint: education
  - id: skills.languages
    source_hint: skills.languages
  - id: skills.technical
    source_hint: skills.technical
  - id: skills.social
    source_hint: skills.social
  - id: references.items
    source_hint: references

rules:
  max_pages: 2
  overflow:
    strategy: continue_to_next_page
    warn_at_page: 2
  widow_orphan_control: true
  bullet_limit_per_experience_item: 6
