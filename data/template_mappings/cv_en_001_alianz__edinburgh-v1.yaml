mapping_version: 1
cv_id: cv_en_001_alianz
template_id: edinburgh-v1

bindings:
  - cv_path: person.full_name
    slot_id: person.full_name
  - cv_path: optional_sections.attachments.0
    slot_id: profile.photo
  - cv_path: person.contact
    slot_id: contact.block
  - cv_path: optional_sections.interests
    slot_id: optional.interests
  - cv_path: skills.languages
    slot_id: skills.languages
  - cv_path: skills.technical
    slot_id: skills.technical
  - cv_path: positioning.profile_summary
    slot_id: positioning.profile_summary
  - cv_path: experience
    slot_id: experience.items
  - cv_path: education
    slot_id: education.items
  - cv_path: optional_sections.certifications
    slot_id: optional.courses
  - cv_path: references
    slot_id: references.items

transforms:
  - slot_id: experience.items
    operation: limit_bullets
    value: 5
  - slot_id: positioning.profile_summary
    operation: join_paragraphs
    value: true

fallbacks:
  missing_field: omit_block
  empty_list: omit_block
